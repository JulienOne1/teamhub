[phases.setup]
nixPkgs = ['php84', 'php84Extensions.pdo', 'php84Extensions.pdo_sqlite', 'php84Extensions.mbstring', 'php84Extensions.tokenizer', 'php84Extensions.xml', 'php84Extensions.ctype', 'php84Extensions.fileinfo', 'php84Extensions.curl', 'php84Extensions.zip', 'composer']

[phases.install]
cmds = ['composer install --no-dev --optimize-autoloader', 'mkdir -p database && touch database/database.sqlite']

[start]
cmd = 'php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=$PORT'